<!DOCTYPE html>
<html>
<head>
    <title>MONOGATARI</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            background: purple;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: red;
        }
    </style>
</head>

<body>

    <h1 id="story">Chị đang đứng trước 4 con đường...</h1>

    <div id="choices">
        <button onclick="chon(1)">Đi đường 1</button>
        <button onclick="chon(2)">Đi đường 2</button>
        <button onclick="chon(3)">Đi đường 3</button>
        <button onclick="chon(4)">Đi đường 4</button>
    </div>

    <script>
        function chon(x) {
            let story = document.getElementById("story");
            let choices = document.getElementById("choices");

            if (x == 1) {
                story.innerHTML = "Chị gặp kho báu 💰";
            }
            else if (x == 2) {
                story.innerHTML = "Chị bị quái đánh 💀";
            }
            else if (x == 3) {
                story.innerHTML = "Chị tìm thấy người yêu 😳";
            }
            else {
                story.innerHTML = "Chị đi lạc luôn 🤡";
            }

            choices.innerHTML = '<button onclick="reset()">Chơi lại</button>';
        }

        function reset() {
            location.reload();
        }
    </script>

</body>
</html>
